name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows-exe:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Validate
        run: |
          python -m ruff check .
          python -m pycodestyle bluetooth_assistant tests bluetooth_assistant_launcher.py
          python -m unittest discover -s tests
          python -m compileall bluetooth_assistant tests
          python -m bluetooth_assistant.diagnostics --json --mock-retry
      - name: Build exe
        shell: pwsh
        run: .\scripts\build_exe.ps1 -Python python
      - name: Smoke test exe help
        run: .\dist\BluetoothAssistant.exe --help
      - name: Publish release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/BluetoothAssistant.exe
          generate_release_notes: true
