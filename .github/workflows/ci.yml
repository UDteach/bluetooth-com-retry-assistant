name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        python-version: ["3.10", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Lint
        run: python -m ruff check .
      - name: PEP 8
        run: python -m pycodestyle bluetooth_assistant tests bluetooth_assistant_launcher.py
      - name: Unit tests
        run: python -m unittest discover -s tests
      - name: Compile
        run: python -m compileall bluetooth_assistant tests
      - name: Safe diagnostics
        run: python -m bluetooth_assistant.diagnostics --json
